name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Cache Electron binary (downloaded separately from npm packages)
      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/Library/Caches/electron
            ${{ runner.os == 'Windows' && format('{0}/electron/Cache', env.LOCALAPPDATA) || '/tmp/electron-unused' }}
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-

      # Linux dependencies for Electron
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm dpkg fakeroot libx11-dev libxkbfile-dev

      # Install dependencies
      - name: Install dependencies
        run: npm ci
        env:
          # Increase download timeout and retries for Electron binary
          ELECTRON_GET_NO_PROGRESS: true
          npm_config_fetch_retry_mintimeout: 60000
          npm_config_fetch_retry_maxtimeout: 300000
          npm_config_fetch_retries: 5

      # Build the app with electron-vite
      - name: Build app
        run: npm run build

      # Package for each platform
      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --x64 --publish never

      - name: Package (Windows)
        if: matrix.platform == 'win32'
        run: npx electron-builder --win --x64 --publish never

      - name: Package (macOS)
        if: matrix.platform == 'darwin' && matrix.arch == 'x64'
        run: npx electron-builder --mac --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package (macOS arm64)
        if: matrix.platform == 'darwin' && matrix.arch == 'arm64'
        run: npx electron-builder --mac --arm64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # Upload artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runlet-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.zip
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.zip" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) -exec cp {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
